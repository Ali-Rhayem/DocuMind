<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">DocuMind data flow and architecture</title>
  <desc id="desc">Upload and query flows connecting the frontend, indexing pipeline, Qdrant, and chat timeline.</desc>
  <defs>
    <style>
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .label { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .node { font: 600 18px 'Segoe UI', Arial, sans-serif; fill: #0f172a; text-anchor: middle; dominant-baseline: middle; }
      .small { font: 600 16px 'Segoe UI', Arial, sans-serif; fill: #334155; text-anchor: middle; dominant-baseline: middle; }
      .tag { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; opacity: 0.98; }
      .line { stroke: #475569; stroke-width: 3.5; fill: none; }
      .line-dashed { stroke: #475569; stroke-width: 3.5; fill: none; stroke-dasharray: 10 8; }
      .panel { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; rx: 24; }
      .upload { fill: #e0e7ff; stroke: #6366f1; stroke-width: 2; }
      .query { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; }
      .store { fill: #d1fae5; stroke: #059669; stroke-width: 2; }
      .output { fill: #fef3c7; stroke: #d97706; stroke-width: 2; }
    </style>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#475569" />
    </marker>
  </defs>

  <rect x="24" y="24" width="1152" height="672" rx="28" fill="#ffffff" stroke="#e2e8f0" stroke-width="2" />

  <text x="70" y="80" class="title">Data Flow &amp; Architecture</text>

  <rect x="56" y="112" width="1088" height="238" class="panel" />
  <text x="88" y="150" class="label">Upload / Indexing Flow</text>

  <rect x="80" y="190" width="150" height="60" rx="16" class="upload" />
  <text x="155" y="220" class="node">User Upload</text>

  <rect x="270" y="190" width="150" height="60" rx="16" class="upload" />
  <text x="345" y="220" class="node">Store File</text>

  <rect x="460" y="190" width="170" height="60" rx="16" class="upload" />
  <text x="545" y="220" class="node">Rebuild Index</text>

  <rect x="670" y="190" width="170" height="60" rx="16" class="upload" />
  <text x="755" y="220" class="node">Load Documents</text>

  <rect x="880" y="190" width="150" height="60" rx="16" class="upload" />
  <text x="955" y="220" class="node">Chunk Text</text>

  <rect x="880" y="280" width="190" height="60" rx="16" class="upload" />
  <text x="975" y="310" class="node">Generate Vectors</text>

  <rect x="520" y="280" width="180" height="60" rx="16" class="store" />
  <text x="610" y="310" class="node">Qdrant DB</text>

  <line x1="230" y1="220" x2="270" y2="220" class="line" marker-end="url(#arrow)" />
  <rect x="223" y="182" width="54" height="24" rx="12" class="tag" />
  <text x="250" y="194" class="small">POST</text>

  <line x1="420" y1="220" x2="460" y2="220" class="line" marker-end="url(#arrow)" />
  <rect x="400" y="182" width="80" height="24" rx="12" class="tag" />
  <text x="440" y="194" class="small">Trigger</text>

  <line x1="630" y1="220" x2="670" y2="220" class="line" marker-end="url(#arrow)" />
  <line x1="840" y1="220" x2="880" y2="220" class="line" marker-end="url(#arrow)" />
  <path d="M 975 250 L 975 280" class="line" marker-end="url(#arrow)" />
  <path d="M 880 310 L 700 310" class="line" marker-end="url(#arrow)" />

  <rect x="56" y="382" width="1088" height="278" class="panel" />
  <text x="88" y="420" class="label">Question / Retrieval Flow</text>

  <rect x="80" y="470" width="170" height="60" rx="16" class="query" />
  <text x="165" y="500" class="node">User Question</text>

  <rect x="290" y="470" width="170" height="60" rx="16" class="query" />
  <text x="375" y="500" class="node">Embed Query</text>

  <rect x="500" y="470" width="170" height="60" rx="16" class="query" />
  <text x="585" y="500" class="node">Vector Search</text>

  <rect x="710" y="470" width="180" height="60" rx="16" class="query" />
  <text x="800" y="500" class="node">Rerank Results</text>

  <rect x="930" y="470" width="170" height="60" rx="16" class="query" />
  <text x="1015" y="500" class="node">Build Answer</text>

  <rect x="930" y="570" width="170" height="60" rx="16" class="output" />
  <text x="1015" y="600" class="node">Chat Timeline</text>

  <line x1="250" y1="500" x2="290" y2="500" class="line" marker-end="url(#arrow)" />
  <rect x="243" y="462" width="54" height="24" rx="12" class="tag" />
  <text x="270" y="474" class="small">POST</text>

  <line x1="460" y1="500" x2="500" y2="500" class="line" marker-end="url(#arrow)" />
  <line x1="670" y1="500" x2="710" y2="500" class="line" marker-end="url(#arrow)" />
  <line x1="890" y1="500" x2="930" y2="500" class="line" marker-end="url(#arrow)" />
  <path d="M 1015 530 L 1015 570" class="line" marker-end="url(#arrow)" />

  <path d="M 585 470 C 585 405, 610 395, 610 340" class="line-dashed" marker-end="url(#arrow)" />
  <rect x="590" y="392" width="64" height="24" rx="12" class="tag" />
  <text x="622" y="404" class="small">search</text>
</svg>
