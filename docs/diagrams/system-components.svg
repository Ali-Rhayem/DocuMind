<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 460" role="img" aria-labelledby="title desc">
  <title id="title">DocuMind system components and interactions</title>
  <desc id="desc">Client, FastAPI, RAG pipeline, Qdrant, and utilities connected with labeled arrows.</desc>
  <defs>
    <style>
      .title { font: 700 32px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .node { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #ffffff; text-anchor: middle; dominant-baseline: middle; }
      .label { font: 600 16px 'Segoe UI', Arial, sans-serif; fill: #334155; text-anchor: middle; dominant-baseline: middle; }
      .tag { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; opacity: 0.98; }
      .line { stroke: #475569; stroke-width: 3.5; fill: none; }
    </style>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#475569" />
    </marker>
  </defs>

  <rect x="24" y="24" width="1052" height="412" rx="28" fill="#ffffff" stroke="#e2e8f0" stroke-width="2" />
  <text x="70" y="80" class="title">System Components &amp; Interactions</text>

  <rect x="70" y="190" width="180" height="76" rx="18" fill="#0d9488" stroke="#14b8a6" stroke-width="2.5" />
  <text x="160" y="228" class="node">Client / React</text>

  <rect x="315" y="190" width="180" height="76" rx="18" fill="#0369a1" stroke="#06b6d4" stroke-width="2.5" />
  <text x="405" y="228" class="node">FastAPI</text>

  <rect x="560" y="90" width="220" height="76" rx="18" fill="#7c2d12" stroke="#ea580c" stroke-width="2.5" />
  <text x="670" y="128" class="node">RAG Pipeline</text>

  <rect x="560" y="290" width="220" height="76" rx="18" fill="#065f46" stroke="#10b981" stroke-width="2.5" />
  <text x="670" y="328" class="node">Qdrant DB</text>

  <rect x="845" y="90" width="180" height="76" rx="18" fill="#581c87" stroke="#c084fc" stroke-width="2.5" />
  <text x="935" y="128" class="node">Utilities</text>

  <line x1="250" y1="228" x2="315" y2="228" class="line" marker-end="url(#arrow)" />
  <rect x="255" y="188" width="54" height="24" rx="12" class="tag" />
  <text x="282" y="200" class="label">HTTP</text>

  <line x1="495" y1="210" x2="560" y2="146" class="line" marker-end="url(#arrow)" />
  <rect x="475" y="150" width="110" height="24" rx="12" class="tag" />
  <text x="530" y="162" class="label">Orchestrate</text>

  <path d="M 470 266 L 520 266 L 560 308" class="line" marker-end="url(#arrow)" />
  <rect x="455" y="248" width="120" height="24" rx="12" class="tag" />
  <text x="515" y="260" class="label">Store / Query</text>

  <line x1="670" y1="166" x2="670" y2="290" class="line" marker-end="url(#arrow)" />
  <rect x="688" y="221" width="56" height="24" rx="12" class="tag" />
  <text x="716" y="233" class="label">Embed</text>

  <line x1="780" y1="128" x2="845" y2="128" class="line" marker-end="url(#arrow)" />
  <rect x="790" y="90" width="44" height="24" rx="12" class="tag" />
  <text x="812" y="102" class="label">Use</text>

  <path d="M 560 344 L 485 344 L 485 260" class="line" marker-end="url(#arrow)" />
  <rect x="490" y="326" width="68" height="24" rx="12" class="tag" />
  <text x="524" y="338" class="label">Return</text>

  <path d="M 315 244 C 290 276, 275 276, 250 244" class="line" marker-end="url(#arrow)" />
  <rect x="243" y="270" width="78" height="24" rx="12" class="tag" />
  <text x="282" y="282" class="label">Response</text>
</svg>
